<!DOCTYPE html>
<html lang="en-US">

<head>
    <!-- Primary Meta Tags -->
    <title>DGSM Editor - Der_Googler</title>
    <meta name="title" content="DGSM Editor - Der_Googler">
    <meta name="description" content="The official DGSM Editor! If you use PMR-Cloud will this tool help you so much!">
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://dergoogler.github.io/editor/">
    <meta property="og:title" content="DGSM Editor - Der_Googler">
    <meta property="og:description" content="The official DGSM Editor! If you use PMR-Cloud will this tool help you so much!">
    <meta property="og:image" content="https://dergoogler.github.io/src/images/googler.900.jpg">
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://dergoogler.github.io/editor/">
    <meta property="twitter:title" content="DGSM Editor - Der_Googler">
    <meta property="twitter:description" content="The official DGSM Editor! If you use PMR-Cloud will this tool help you so much!">
    <meta property="twitter:image" content="https://dergoogler.github.io/src/images/googler.900.jpg">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="shortcut icon" type="image/x-icon" href="/src/images/pmr-cloud.png" />
    <link rel="stylesheet" type="text/css" href="/src/fw/css/all.css">
    <link rel="stylesheet/less" type="text/css" href="/src/css/md.less">
    <link rel="stylesheet/less" type="text/css" href="/src/css/md4.less">
    <style>
        .markdown-body {
            box-sizing: border-box;
            min-width: 200px;
            max-width: 980px;
            margin: 0 auto;
            padding: 45px;
        }
        
        @media (max-width: 767px) {
            .markdown-body {
                padding: 15px;
            }
        }
    </style>
    <script src="//cdn.jsdelivr.net/npm/less"></script>
    <script src="/src/js/main.js"></script>
    <script src="/src/js/markdown.js"></script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/@pwabuilder/pwainstall@latest/dist/pwa-install.min.js"></script>
</head>

<body>

    <div class="supported">
        <div id="web-header" class="header-wrapper">
            <nav class="navbar navbar-light bg-primary">
                <div class="container-fluid">
                    <span class="navbar-brand mb-0 h1" style="color: #fff;">Official DGSM Editor
                        <small>(Beta)</small></span>
                </div>
            </nav>
        </div>

        <div class="container-fluid" style="padding: 15px;">
            <div style="margin: 10px;"></div>
            <div class="btn-group" role="group" aria-label="Basic example">
                <!-- Example single danger button -->
                <div class="btn-group">
                    <button type="button" class="btn btn-primary dropdown-toggle" data-bs-toggle="dropdown" aria-expanded="false"><i class="fal fa-sd-card"></i>&nbsp;Load & Saving</button>
                    <ul class="dropdown-menu">
                        <li><a class="dropdown-item" onclick="save()"><i class="fal fa-save"></i>&nbsp;Save</a></li>
                        <li><a class="dropdown-item" onclick="load()"><i class="fal fa-cookie"></i>&nbsp;Load</a></li>
                        <li>
                            <hr class="dropdown-divider">
                        </li>
                        <li><a class="dropdown-item" onclick="download_as_file_code()"><i
                                    class="fal fa-download"></i>&nbsp;Download File</a></li>
                    </ul>
                </div>
                <button type="button" class="btn btn-primary" onclick="get_source_from_url()"><i
                        class="fal fa-link"></i> Get from URL</button>
            </div>
            <div class="btn-group" role="group" aria-label="Basic example">
                <button type="button" class="btn btn-primary" onclick="window.open('/?/blog/#/components/', '_blank', 'location=yes,height=2000,width=1000,scrollbars=0,status=yes,toolbar=0');"><i
                        class="fal fa-cogs"></i> Components</button>
                <button type="submit" class="btn btn-primary" onclick="window.open('/?/safty/#/licences/', '_blank', 'location=yes,height=2000,width=1000,scrollbars=0,status=yes,toolbar=0');"><i
                        class="fal fa-file-certificate"></i> Licences</button>
            </div>
            <div class="btn-group" role="group" aria-label="Basic example">
                <div class="btn-group">
                    <button type="button" class="btn btn-primary dropdown-toggle" data-bs-toggle="dropdown" aria-expanded="false"><i class="fal fa-file"></i>&nbsp;Changelogs</button>
                    <ul class="dropdown-menu">
                        <li><a class="dropdown-item" onclick="changelogs('v1.0')">v1.0</a></li>
                        <li><a class="dropdown-item" onclick="changelogs('v1.1')">v1.1</a></li>
                    </ul>
                </div>
            </div>

            <div style="margin: 10px;"></div>
            <div class="btn-group" role="group" aria-label="Basic example">

                <div class="btn-group">
                    <button type="button" class="btn btn-success dropdown-toggle" data-bs-toggle="dropdown" aria-expanded="false">Tools</button>
                    <ul class="dropdown-menu">
                        <li><a class="dropdown-item" href="https://emgithub.com/"><i
                                    class="fab fa-github"></i>&nbsp;Github&nbsp;Code&nbsp;Embed</a></li>
                        <li><a class="dropdown-item" href="https://tableconvert.com/"><i
                                    class="fal fa-table"></i>&nbsp;Table&nbsp;Generator</a></li>
                    </ul>
                </div>
                <div class="btn-group">
                    <button type="button" class="btn btn-success dropdown-toggle" data-bs-toggle="dropdown" aria-expanded="false">Examples</button>
                    <ul class="dropdown-menu">
                        <li><a class="dropdown-item" href="/?/pmr/#/DerGoogler/general-releases/main/sample/">Example&nbsp;1</a></li>
                        <li><a class="dropdown-item" href="/?/pmr/#/DerGoogler/general-releases/main/bootstrap/">Example&nbsp;2</a></li>
                        <li><a class="dropdown-item" href="/?/pmr/#/DerGoogler/general-releases/main/onsenui/">Example&nbsp;3</a></li>
                    </ul>
                </div>
            </div>

            <div style="margin: 10px;"></div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="dgsm_input">Enter DGSM Code <b><em id="entred_letters"></em></b></label>
                    <div id="higlight_true_or_false">
                        <textarea class="form-control" id="dgsm_input" rows="3" oninput="editor_paeser()" style="display:inline-block;white-space: pre-wrap; height: 500px;overflow-y: scroll;overflow-x: hidden;background-color:#222222;color:#fafafa;resize: none;" spellcheck="false"
                            placeholder="Enter"></textarea>
                    </div>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="dgsm_output">Output of *.dgsm</label>
                    <iframe class="form-control" id="dgsm_output" style="padding:0px;margin:0px;height: 500px; overflow: auto; overflow-x: hidden;word-wrap: none;"></iframe>
                </div>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <div class="d-grid gap-2">
                        <button class="btn btn-primary" type="button" onclick="get_source_from_url()"><i
                                class="fal fa-link"></i>&nbsp;Get&nbsp;from&nbsp;URL</button>
                    </div>
                    <br>
                    <div class="d-grid gap-2">
                        <button class="btn btn-primary" type="button" onclick="preview_code()">Source&nbsp;Code</button>
                    </div>
                </div>
                <div class="col-md-6 mb-3">
                    <div class="d-grid gap-2">
                        <button class="btn btn-primary" type="button" onclick="preview()"><i class="fal fa-eye"></i>&nbsp;Preview</button>
                        <div class="alert alert-danger" role="alert">
                            <b>NOTE!</b> Comments will not work in base64 urls.
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta1/dist/js/bootstrap.bundle.min.js" integrity="sha384-ygbV9kiqUc6oa4msXn9868pTtWMgiQaeYH7/t7LECLbyPA2x65Kgf80OJFdroafW" crossorigin="anonymous"></script>

</body>

</html>
